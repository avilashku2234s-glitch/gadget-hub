<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadget Hub | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <div class="max-w-4xl mx-auto py-10 px-4">
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-indigo-100 mb-10">
            <h2 class="text-3xl font-black text-indigo-700 mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                </svg>
                Admin Panel
            </h2>
            
            <form id="productForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Product Name</label>
                    <input type="text" id="pName" placeholder="e.g. iPhone 15 Pro Max" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Select Category</label>
                    <select id="pCategory" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                        <option value="Mobiles">Mobiles</option>
                        <option value="Laptops">Laptops</option>
                        <option value="Audio">Audio</option>
                        <option value="Watches">Watches</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Image URL</label>
                    <input type="url" id="pImage" placeholder="https://example.com/image.jpg" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Sale Price (₹)</label>
                    <input type="number" id="pPrice" placeholder="99000" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Affiliate Link</label>
                    <input type="url" id="pLink" placeholder="https://amazon.to/your-id" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" required>
                </div>

                <div class="md:col-span-2">
                    <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl transition-all shadow-lg uppercase tracking-widest">
                        Upload to Website
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <h3 class="text-2xl font-black text-gray-800 mb-6 uppercase tracking-tight">Manage Products</h3>
            <div id="adminProductList" class="space-y-4">
                <p class="text-gray-400">Loading products...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5pKW4Fi6CfQzW58RBoPA5fIL4JIfJoH0",
            authDomain: "gadget-hub-3b6e5.firebaseapp.com",
            projectId:  "gadget-hub-3b6e5",
            storageBucket: "gadget-hub-3b6e5.firebasestorage.app",
            messagingSenderId: "393761011089",
            appId: "1:393761011089:web:0c6ff49e65d05aa3ca9630"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('productForm');
        const btn = document.getElementById('submitBtn');
        const adminList = document.getElementById('adminProductList');

        // 1. UPLOAD LOGIC
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "products"), {
                    name: document.getElementById('pName').value,
                    category: document.getElementById('pCategory').value,
                    image: document.getElementById('pImage').value,
                    link: document.getElementById('pLink').value,
                    price: document.getElementById('pPrice').value,
                    createdAt: serverTimestamp()
                });
                alert("Product live ho gaya!");
                form.reset();
            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                btn.innerText = "Upload to Website";
                btn.disabled = false;
            }
        });

        // 2. FETCH & SHOW PRODUCTS IN ADMIN PANEL
        const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            adminList.innerHTML = '';
            if(snapshot.empty) {
                adminList.innerHTML = '<p class="text-gray-400">No products found.</p>';
                return;
            }
            snapshot.forEach((productDoc) => {
                const p = productDoc.data();
                const id = productDoc.id;
                
                adminList.innerHTML += `
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-100 hover:border-indigo-200 transition-all">
                        <div class="flex items-center gap-4">
                            <img src="${p.image}" class="w-12 h-12 object-contain bg-white rounded-lg border">
                            <div>
                                <h4 class="font-bold text-gray-800 text-sm">${p.name}</h4>
                                <p class="text-xs text-gray-500">${p.category} | ₹${p.price}</p>
                            </div>
                        </div>
                        <button onclick="deleteProduct('${id}')" class="bg-red-50 text-red-600 hover:bg-red-600 hover:text-white p-2 rounded-lg transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                `;
            });
        });

        // 3. DELETE LOGIC
        window.deleteProduct = async (id) => {
            if(confirm("Kya aap is product ko delete karna chahte hain?")) {
                try {
                    await deleteDoc(doc(db, "products", id));
                    alert("Product hata diya gaya!");
                } catch (error) {
                    alert("Delete karne mein error aaya!");
                }
            }
        };
    </script>
</body>
</html>
